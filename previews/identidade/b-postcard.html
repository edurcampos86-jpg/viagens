<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta B — Cartão postal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:  #f4f1e8;
    --paper2: #ece8db;
    --ink:    #1b2845;
    --ink2:   #2d3b58;
    --muted:  #7a746b;
    --gold:   #c9a961;
    --gold-d: #9c8344;
    --line:   #d5cfbf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; font-size: 16px; line-height: 1.6; }
  .serif { font-family: 'Playfair Display', Georgia, serif; }

  /* Sutil textura papel via repeating gradient */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: -1;
    background:
      radial-gradient(circle at 20% 30%, rgba(201,169,97,.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(27,40,69,.03), transparent 50%);
  }

  .back { position: fixed; top: 16px; left: 16px; z-index: 100; background: var(--paper); padding: 8px 14px; border: 1px solid var(--line); border-radius: 999px; text-decoration: none; color: var(--ink); font-size: 13px; transition: all .15s; }
  .back:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Header com "selo" */
  .hdr { padding: 72px 24px 48px; text-align: center; position: relative; }
  .hdr-stamp { display: inline-block; padding: 8px 16px; border: 1.5px solid var(--gold); border-radius: 4px; color: var(--gold-d); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 600; transform: rotate(-2deg); margin-bottom: 24px; background: rgba(255,253,247,.5); }
  .hdr-title { font-family: 'Playfair Display', serif; font-weight: 600; font-size: clamp(40px, 8vw, 72px); letter-spacing: -0.01em; line-height: 1.05; color: var(--ink); }
  .hdr-tag { color: var(--muted); margin-top: 16px; font-size: 15px; max-width: 480px; margin-left: auto; margin-right: auto; font-style: italic; }
  .hdr-divider { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 32px; }
  .hdr-divider .line { width: 48px; height: 1px; background: var(--gold); }
  .hdr-divider .diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

  .main { max-width: 1080px; margin: 0 auto; padding: 32px 20px 64px; }

  /* Card postal — próxima */
  .postcard {
    background: white;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 48px;
    box-shadow: 0 1px 0 var(--line), 0 8px 24px rgba(27,40,69,.06);
    position: relative;
  }
  .postcard-front { display: grid; grid-template-columns: 1fr; }
  @media (min-width: 720px) { .postcard-front { grid-template-columns: 1.3fr 1fr; } }
  .postcard-img { aspect-ratio: 4/3; background: var(--paper2) center/cover no-repeat; position: relative; }
  .postcard-img::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 70%, rgba(27,40,69,.15)); }
  .postcard-body { padding: 36px 32px; display: flex; flex-direction: column; gap: 14px; position: relative; }
  .postcard-stamp { position: absolute; top: 20px; right: 20px; padding: 6px 10px; border: 1.5px solid var(--gold); color: var(--gold-d); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600; transform: rotate(8deg); border-radius: 3px; }
  .postcard-kicker { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-d); font-weight: 600; }
  .postcard-name { font-family: 'Playfair Display', serif; font-weight: 500; font-size: clamp(28px, 5vw, 40px); letter-spacing: -0.01em; line-height: 1.1; color: var(--ink); }
  .postcard-dates { color: var(--muted); font-size: 14px; font-style: italic; }
  .postcard-cd { margin-top: auto; display: flex; align-items: baseline; gap: 14px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .postcard-cd-n { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 56px; line-height: 1; color: var(--ink); }
  .postcard-cd-l { font-size: 13px; color: var(--muted); }

  /* Última realizada */
  .last { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 32px; margin-bottom: 64px; box-shadow: 0 8px 24px rgba(27,40,69,.04); }
  .last-grid { display: grid; grid-template-columns: 1fr; gap: 24px; align-items: center; }
  @media (min-width: 720px) { .last-grid { grid-template-columns: 1fr 1.3fr; gap: 36px; } }
  .last-img { aspect-ratio: 1/1; background: var(--paper2) center/cover no-repeat; border-radius: 4px; }
  .last-memory { font-family: 'Playfair Display', serif; font-style: italic; font-size: 19px; line-height: 1.55; color: var(--ink2); margin-top: 16px; }
  .last-memory::before { content: "« "; color: var(--gold); }
  .last-memory::after { content: " »"; color: var(--gold); }

  /* Seção arquivo */
  .section-title { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .section-title .ornament { color: var(--gold); font-size: 14px; }
  .section-title .label { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; color: var(--ink); }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .list { display: grid; grid-template-columns: 1fr; gap: 28px; }
  @media (min-width: 600px) { .list { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 920px) { .list { grid-template-columns: 1fr 1fr 1fr; } }
  .item { background: white; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; transition: transform .2s, box-shadow .2s; }
  .item:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(27,40,69,.1); }
  .item-img { aspect-ratio: 4/3; background: var(--paper2) center/cover no-repeat; }
  .item-body { padding: 18px 20px 22px; }
  .item-kicker { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-d); font-weight: 600; margin-bottom: 6px; }
  .item-name { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 19px; line-height: 1.25; color: var(--ink); margin-bottom: 4px; }
  .item-sub { color: var(--muted); font-size: 13px; font-style: italic; }

  .ft { margin-top: 64px; padding: 32px 24px; text-align: center; color: var(--muted); font-size: 12px; }
  .ft .serif { font-style: italic; }
</style>
</head>
<body>
  <a class="back" href="index.html">← Voltar</a>

  <header class="hdr">
    <span class="hdr-stamp">Eduardo Campos · ✈ · 2021–2027</span>
    <h1 class="hdr-title">Minhas Viagens</h1>
    <p class="hdr-tag">Um caderno de memórias e planos pelo mundo</p>
    <div class="hdr-divider">
      <span class="line"></span><span class="diamond"></span><span class="line"></span>
    </div>
  </header>

  <main class="main">
    <article class="postcard" id="next" hidden>
      <div class="postcard-front">
        <div class="postcard-img" id="next-img"></div>
        <div class="postcard-body">
          <span class="postcard-stamp">Próxima</span>
          <div class="postcard-kicker">Embarque marcado</div>
          <h2 class="postcard-name" id="next-name"></h2>
          <div class="postcard-dates" id="next-dates"></div>
          <div class="postcard-cd">
            <span class="postcard-cd-n" id="next-cd-n"></span>
            <span class="postcard-cd-l">dias até a partida</span>
          </div>
        </div>
      </div>
    </article>

    <section class="last" id="last" hidden>
      <div class="last-grid">
        <div class="last-img" id="last-img"></div>
        <div>
          <div class="postcard-kicker">Última realizada</div>
          <h3 class="postcard-name" id="last-name" style="font-size:32px;margin-top:8px;"></h3>
          <div class="postcard-dates" id="last-dates"></div>
          <p class="last-memory" id="last-memory"></p>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title">
        <span class="ornament">✦</span>
        <span class="label">Arquivo de viagens</span>
      </div>
      <div class="list" id="list"></div>
    </section>
  </main>

  <footer class="ft">
    Proposta B — Cartão postal · <span class="serif">Playfair Display</span> + DM Sans · paleta creme &amp; navy &amp; ouro
  </footer>

  <script type="module">
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const fmtDate = iso => {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${parseInt(d)} de ${MONTHS[parseInt(m)-1]}, ${y}`;
    };
    const fmtRange = (s, e) => s && e ? `${fmtDate(s)} — ${fmtDate(e)}` : (s ? fmtDate(s) : '');
    const imgFor = trip => `https://picsum.photos/seed/${encodeURIComponent(trip.id)}/1200/900`;

    const tripStart = t => t.startDate || (t.year && t.month ? `${t.year}-${String(t.month).padStart(2,'0')}-01` : null);
    const daysUntil = t => {
      const s = tripStart(t); if (!s) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(s + 'T00:00:00');
      return Math.round((d - today) / 86400000);
    };

    async function boot() {
      const res = await fetch('../../data/trips.json');
      const data = await res.json();
      const trips = data.trips;

      const futuras = trips
        .filter(t => ['planned','em_planejamento'].includes(t.status))
        .filter(t => daysUntil(t) >= 0)
        .sort((a,b) => daysUntil(a) - daysUntil(b));
      if (futuras.length) {
        const t = futuras[0];
        document.getElementById('next').hidden = false;
        document.getElementById('next-img').style.backgroundImage = `url(${imgFor(t)})`;
        document.getElementById('next-name').textContent = t.name;
        document.getElementById('next-dates').textContent = fmtRange(t.startDate, t.endDate) || t.label;
        document.getElementById('next-cd-n').textContent = daysUntil(t);
      }

      const done = trips
        .filter(t => t.status === 'done')
        .sort((a,b) => (b.year - a.year) || (b.month - a.month));
      if (done.length) {
        const t = done[0];
        document.getElementById('last').hidden = false;
        document.getElementById('last-img').style.backgroundImage = `url(${imgFor(t)})`;
        document.getElementById('last-name').textContent = t.name;
        document.getElementById('last-dates').textContent = t.label;
        document.getElementById('last-memory').textContent = t.memory || '';
      }

      const recent = done.slice(1, 7);
      const list = document.getElementById('list');
      list.innerHTML = recent.map(t => `
        <article class="item">
          <div class="item-img" style="background-image:url(${imgFor(t)})"></div>
          <div class="item-body">
            <div class="item-kicker">${t.label}</div>
            <h3 class="item-name">${t.name}</h3>
            <div class="item-sub">${t.sub || ''}</div>
          </div>
        </article>
      `).join('');
    }
    boot().catch(e => console.error(e));
  </script>
</body>
</html>
