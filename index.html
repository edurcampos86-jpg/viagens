<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0369a1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
<meta name="description" content="Portfólio de viagens, memórias e planejamento de Eduardo Campos — 2021 até hoje, com mapas, rotas, custos e logística por destino.">

<meta property="og:type" content="website">
<meta property="og:title" content="Minhas Viagens — Eduardo Campos">
<meta property="og:description" content="Memórias e planejamento de viagens pelo mundo, com mapa interativo, rotas e custos.">
<meta property="og:locale" content="pt_BR">
<meta name="twitter:card" content="summary_large_image">

<title>🌍 Minhas Viagens — Eduardo Campos</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">

<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/sketchy.css">
<link rel="stylesheet" href="assets/sketchy-extras.css">
<link rel="stylesheet" href="assets/patches.css">
</head>
<body>

<a class="skip-link" href="#main">Pular para o conteúdo</a>

<header class="hdr" role="banner">
  <div class="hdr-inner">
    <div class="hdr-left">
      <h1><span aria-hidden="true">🌍</span> <span class="hdr-title">Minhas Viagens</span></h1>
      <p id="hdr-sub">Carregando…</p>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="installBtn" hidden aria-label="Instalar como aplicativo">
        <span aria-hidden="true">⬇</span> <span class="btn-label">Instalar</span>
      </button>
      <button class="icon-btn" id="darkBtn" aria-pressed="false" aria-label="Alternar tema">
        <span class="dark-icon" aria-hidden="true">🌙</span>
        <span class="btn-label" id="darkLbl">Escuro</span>
      </button>
    </div>
  </div>
</header>

<main id="main" tabindex="-1">

  <!-- STATS -->
  <section class="stats-section" aria-labelledby="stats-title">
    <h2 id="stats-title" class="sr-only">Estatísticas</h2>
    <div class="stats" id="stats" role="list"></div>
    <div class="insights" id="insights" role="list" aria-label="Insights de viagem"></div>
  </section>

  <!-- LAYOUT 2-COL DESKTOP -->
  <div class="layout">

    <!-- LEFT/STICKY: filters + map -->
    <aside class="col-left" aria-label="Filtros e mapa">

      <!-- STATUS TOGGLE -->
      <div class="status-bar" role="tablist" aria-label="Status das viagens">
        <button class="status-btn active" role="tab" aria-selected="true" data-status="all">Todas</button>
        <button class="status-btn" role="tab" aria-selected="false" data-status="done">✓ Realizadas</button>
        <button class="status-btn" role="tab" aria-selected="false" data-status="planned">📅 Planejadas</button>
        <button class="status-btn" role="tab" aria-selected="false" data-status="wishlist">⭐ Wishlist</button>
      </div>

      <!-- YEAR TIMELINE -->
      <div class="ytl" id="ytl" role="tablist" aria-label="Filtro por ano"></div>

      <!-- SEARCH + FILTER -->
      <div class="controls">
        <div class="search-wrap">
          <span aria-hidden="true">🔍</span>
          <input type="search" id="search" placeholder="Buscar destino, país, cidade…" aria-label="Buscar viagem" autocomplete="off"/>
        </div>
        <button class="advanced-toggle" id="advToggle" aria-expanded="false" aria-controls="advPanel">
          <span aria-hidden="true">⚙</span> Filtros
          <span class="adv-count" id="advCount" hidden>0</span>
        </button>
      </div>

      <!-- CONTINENT PILLS -->
      <div class="filter-row" role="tablist" aria-label="Filtro por continente">
        <button class="fbtn active" role="tab" aria-selected="true" data-cont="all">🌍 Todos</button>
        <button class="fbtn" role="tab" aria-selected="false" data-cont="Asia">🏯 Ásia</button>
        <button class="fbtn" role="tab" aria-selected="false" data-cont="Europe">🏰 Europa</button>
        <button class="fbtn" role="tab" aria-selected="false" data-cont="Americas">🌎 Américas</button>
        <button class="fbtn" role="tab" aria-selected="false" data-cont="Africa">🦁 África</button>
        <button class="fbtn" role="tab" aria-selected="false" data-cont="Oceania">🏝 Oceania</button>
      </div>

      <!-- ADVANCED FILTERS -->
      <div class="adv-panel" id="advPanel" hidden>
        <div class="adv-group">
          <label class="adv-lbl" for="filterMonth">Mês</label>
          <select id="filterMonth" class="adv-select">
            <option value="all">Qualquer</option>
            <option value="1">Jan</option><option value="2">Fev</option><option value="3">Mar</option>
            <option value="4">Abr</option><option value="5">Mai</option><option value="6">Jun</option>
            <option value="7">Jul</option><option value="8">Ago</option><option value="9">Set</option>
            <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
          </select>
        </div>
        <div class="adv-group">
          <label class="adv-lbl" for="filterDuration">Duração</label>
          <select id="filterDuration" class="adv-select">
            <option value="all">Qualquer</option>
            <option value="short">≤ 5 noites</option>
            <option value="medium">6 a 10 noites</option>
            <option value="long">11+ noites</option>
          </select>
        </div>
        <div class="adv-group">
          <label class="adv-lbl" for="filterType">Tipo</label>
          <select id="filterType" class="adv-select">
            <option value="all">Qualquer</option>
            <option value="leisure">Lazer</option>
            <option value="business">Trabalho/Evento</option>
            <option value="festival">Festival</option>
            <option value="adventure">Aventura</option>
          </select>
        </div>
        <div class="adv-group">
          <label class="adv-lbl" for="filterPax">Companhia</label>
          <select id="filterPax" class="adv-select">
            <option value="all">Qualquer</option>
          </select>
        </div>
        <button class="adv-clear" id="advClear">Limpar filtros</button>
      </div>

      <!-- ACTIVE CHIPS -->
      <div class="active-chips" id="activeChips" aria-live="polite"></div>

      <!-- YEAR SLIDER -->
      <div class="slider-bar">
        <label class="sl-lbl" for="yearSlider">📅 Até o ano</label>
        <div class="sl-track">
          <input type="range" id="yearSlider" min="2021" max="2028" value="2028" step="1" aria-label="Filtrar viagens até o ano"/>
        </div>
        <output class="sl-val" id="sliderVal" for="yearSlider">2028</output>
      </div>

      <!-- MAP -->
      <div class="map-wrap" role="region" aria-label="Mapa interativo das viagens">
        <div id="map" tabindex="0"></div>
      </div>

      <!-- MAP LEGEND -->
      <div class="map-legend" aria-label="Legenda do mapa">
        <span class="leg"><span class="leg-d" style="background:#06b6d4"></span>Ásia</span>
        <span class="leg"><span class="leg-d" style="background:#3b82f6"></span>Europa</span>
        <span class="leg"><span class="leg-d" style="background:#22c55e"></span>Américas</span>
        <span class="leg"><span class="leg-d" style="background:#f97316"></span>África</span>
        <span class="leg"><span class="leg-d" style="background:#10b981"></span>Oceania</span>
        <span class="leg-note">Clique no pin para abrir · Pin tracejado = planejado/wishlist</span>
      </div>
    </aside>

    <!-- RIGHT/SCROLLABLE: trip list -->
    <section class="col-right" aria-labelledby="trip-list-title">
      <h2 id="trip-list-title" class="sec-title">
        <span id="secTitleText">📅 Linha do Tempo das Viagens</span>
        <span class="sec-count" id="secCount" aria-live="polite"></span>
      </h2>
      <div class="grid" id="grid"></div>
      <div class="no-results" id="noResults" role="status">
        <p>😕 Nenhuma viagem encontrada com esses filtros.</p>
        <button class="link-btn" id="clearAll">Limpar todos os filtros</button>
      </div>
    </section>

  </div>

</main>

<!-- TRIP TEMPLATE (used by JS to clone) -->
<template id="tpl-trip-card">
  <article class="card" role="article">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-hero" data-hero>
        <div class="card-hero-bg" data-hero-bg></div>
        <div class="card-hero-ov"></div>
        <span class="card-hero-emoji" data-hero-emoji aria-hidden="true"></span>
        <span class="card-hero-flag" data-hero-flag aria-hidden="true"></span>
        <span class="card-hero-badge" data-hero-badge hidden></span>
        <div class="card-hero-info">
          <div class="card-hero-name" data-hero-name></div>
          <div class="card-hero-sub" data-hero-sub></div>
        </div>
      </div>
      <button class="card-toggle" data-toggle aria-expanded="false">
        <div class="card-info">
          <div class="card-row1">
            <div class="card-name">
              <span data-name></span>
              <span class="badge-ok" data-badge-ok hidden>✓ Confirmada</span>
              <span class="badge-planned" data-badge-planned hidden>📅 Planejada</span>
              <span class="badge-wish" data-badge-wish hidden>⭐ Wishlist</span>
            </div>
            <span class="card-date" data-date></span>
          </div>
          <div class="card-place" data-place></div>
          <div class="card-tags">
            <span class="ct ct-air" data-tag-air></span>
            <span class="ct ct-pax" data-tag-pax></span>
            <span class="ct ct-nts" data-tag-nts></span>
          </div>
        </div>
        <span class="card-chevron" aria-hidden="true">›</span>
      </button>
      <div class="card-exp" data-exp hidden>
        <div class="tabs" role="tablist" aria-label="Detalhes da viagem">
          <button class="tab active" role="tab" aria-selected="true" data-tab="diary">📖 Diário</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="route">🗺 Roteiro</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="logistics">✈ Logística</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="cost">💰 Custos</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="gallery">📸 Galeria</button>
        </div>
        <div class="tab-panels">
          <div class="tab-panel active" role="tabpanel" data-panel="diary">
            <div class="hlights" data-highlights></div>
            <blockquote class="memory" data-memory></blockquote>
          </div>
          <div class="tab-panel" role="tabpanel" data-panel="route" hidden>
            <div class="mini-map" data-minimap></div>
            <ol class="route-list" data-route-list></ol>
          </div>
          <div class="tab-panel" role="tabpanel" data-panel="logistics" hidden>
            <div class="log-section">
              <h4>Hotéis</h4>
              <ul class="log-list" data-log-hotels></ul>
            </div>
            <div class="log-section">
              <h4>Restaurantes</h4>
              <ul class="log-list" data-log-restaurants></ul>
            </div>
            <div class="log-section">
              <h4>Dicas</h4>
              <p class="log-tips" data-log-tips></p>
            </div>
          </div>
          <div class="tab-panel" role="tabpanel" data-panel="cost" hidden>
            <div class="cost-total" data-cost-total></div>
            <div class="cost-bars" data-cost-bars></div>
            <p class="cost-note">Estimativa em <span data-cost-curr></span> · ~<span data-cost-day></span>/dia</p>
          </div>
          <div class="tab-panel" role="tabpanel" data-panel="gallery" hidden>
            <div class="gallery" data-gallery></div>
            <p class="gallery-empty" data-gallery-empty hidden>Sem fotos ainda — adicione URLs em <code>data/trips.json</code> (campo <code>gallery</code>).</p>
          </div>
        </div>
        <div class="card-actions">
          <button class="share-btn" data-share>
            <span aria-hidden="true">📤</span> Compartilhar
          </button>
          <button class="link-btn" data-permalink>🔗 Copiar link</button>
        </div>
      </div>
    </div>
  </article>
</template>

<!-- SHARE DIALOG -->
<dialog id="shareDialog" class="share-dialog" aria-labelledby="shareTitle">
  <form method="dialog" class="share-sheet">
    <h3 id="shareTitle">Compartilhar viagem</h3>
    <div class="share-options">
      <button type="button" class="sh-opt" data-share-action="copy">
        <span class="sh-icon" style="background:#f1f5f9" aria-hidden="true">📋</span>
        <span class="sh-lbl">Copiar texto</span>
      </button>
      <button type="button" class="sh-opt" data-share-action="whatsapp">
        <span class="sh-icon" style="background:#dcfce7" aria-hidden="true">💬</span>
        <span class="sh-lbl">WhatsApp</span>
      </button>
      <button type="button" class="sh-opt" data-share-action="x">
        <span class="sh-icon" style="background:#e0f2fe" aria-hidden="true">𝕏</span>
        <span class="sh-lbl">X / Twitter</span>
      </button>
      <button type="button" class="sh-opt" data-share-action="native">
        <span class="sh-icon" style="background:#eff6ff" aria-hidden="true">🔗</span>
        <span class="sh-lbl">Sistema</span>
      </button>
    </div>
    <button type="submit" class="share-close">Cancelar</button>
  </form>
</dialog>

<div class="share-toast" id="shareToast" role="status" aria-live="polite"></div>

<noscript>
  <div style="padding:24px;text-align:center;background:#fef3c7;color:#92400e;">
    ⚠ Este site funciona melhor com JavaScript habilitado. As viagens estão armazenadas em
    <a href="data/trips.json"><code>data/trips.json</code></a>.
  </div>
</noscript>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script src="assets/app.js" type="module"></script>
<script src="assets/sketchy.js" defer></script>
<script src="assets/sketchy-extras.js" defer></script>
</body>
</html>
