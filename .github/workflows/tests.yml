name: tests

on:
  pull_request:
    paths:
      - "scripts/**.py"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "scripts/**.py"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          pip install python-dateutil
          pip install -r scripts/requirements-validate.txt

      - name: Run unit tests (sem deps Google nem Anthropic)
        run: |
          python scripts/test_parsers.py
          python scripts/test_matching.py
          python scripts/test_auditor.py
          python scripts/test_curador.py
